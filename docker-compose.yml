version: '3.8'

services:
  trading-bot:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - BINANCE_API_KEY=${BINANCE_API_KEY}
      - BINANCE_SECRET=${BINANCE_SECRET}
      - SOLANA_RPC_URL=${SOLANA_RPC_URL}
      - WALLET_PRIVATE_KEY=${WALLET_PRIVATE_KEY}
      - PAPER_TRADING=true
    restart: always

  # For the Python AI service (if separate)
