version: '3.8'

services:
  trading-bot:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - FIREBASE_CLIENT_EMAIL=${FIREBASE_CLIENT_EMAIL}
      - FIREBASE_PRIVATE_KEY=${FIREBASE_PRIVATE_KEY}
      - BRIDGE_URL=http://mt5-bridge:8001
    depends_on:
      - mt5-bridge
    restart: always

  mt5-bridge:
    build: 
      context: .
      dockerfile: Dockerfile.bridge # Assuming a bridge dockerfile or just use python image
    ports:
      - "8001:8001"
    environment:
      - MT5_LOGIN=${MT5_LOGIN}
      - MT5_PASSWORD=${MT5_PASSWORD}
      - MT5_SERVER=${MT5_SERVER}
    restart: always
